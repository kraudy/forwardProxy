# Squid forward proxy - Work-only access (whitelist)
http_port 192.168.0.0:3128          # Red interna

# === CACHE SETTINGS ===
cache_dir ufs /var/spool/squid 2000 16 256
cache_mem 256 MB
maximum_object_size_in_memory 4 MB
maximum_object_size 100 MB

# === ACLs ===
acl localnet src 192.168.1.0/24     # Red externa
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl Safe_ports port 21
acl Safe_ports port 1025-65535
acl CONNECT method CONNECT

# Security basics
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# === WORK-ONLY WHITELIST ===
acl allowed_sites dstdomain "/etc/squid/whitelist.txt"

# Allow only whitelisted sites from your LAN
http_access allow localnet allowed_sites
http_access allow localhost

# Deny everything else
http_access deny all

# Logging (fixed for modern Squid)
access_log stdio:/var/log/squid/access.log squid
cache_log stdio:/var/log/squid/cache.log

pid_filename /var/run/squid.pid

# Misc
httpd_suppress_version_string on
via off
forwarded_for delete
dns_nameservers 8.8.8.8 8.8.4.4