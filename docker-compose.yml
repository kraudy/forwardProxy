services:
  squid:
    image: ubuntu/squid:latest

    build:
      context: .                    # ← root of repo
      dockerfile: Dockerfile        # ← our new multi-stage one

    container_name: squid-proxy
    ports:
      - "192.168.0.181:3128:3128"   # ← listens ONLY on your internal NIC (physical separation)
    volumes:
      - ./squid.conf:/etc/squid/squid.conf:ro
      - ./whitelist.txt:/etc/squid/whitelist.txt:ro
      - squid_cache:/var/spool/squid
      - squid_logs:/var/log/squid

    environment:
      TZ: America/Managua

    restart: unless-stopped

volumes:
  squid_cache:
  squid_logs: